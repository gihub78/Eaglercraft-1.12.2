<!DOCTYPE html>
<html>
<body>
    <button onclick="startBounce()">开始弹跳动画</button>

    <script>
        let bounceWin;
        let x = 10, y = 10;
        let dx = 5, dy = 5; // 移动速度

        function startBounce() {
            // 打开一个真实的小窗口
            bounceWin = window.open('', '', 'width=200,height=200');
            bounceWin.document.write('<h1>我在跳！</h1>');
            
            // 启动动画循环
            setInterval(() => {
                // 更新坐标
                x += dx;
                y += dy;

                // 碰撞检测：碰到屏幕边缘就反弹
                if (x + 200 > screen.width || x < 0) dx = -dx;
                if (y + 200 > screen.height || y < 0) dy = -dy;

                // 移动窗口位置
                bounceWin.moveTo(x, y);
            }, 20); // 每20毫秒移动一次
        }
    </script>
</body>
</html>
