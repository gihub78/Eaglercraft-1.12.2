<!DOCTYPE html>
<html>
<head>
    <title>Multiverse Bouncing Windows</title>
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background: #2f3542; color: white; font-family: sans-serif;
        }
        button { 
            padding: 20px 40px; font-size: 24px; cursor: pointer; 
            background: #ff4757; border: none; border-radius: 50px; color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.2s;
        }
        button:hover { transform: scale(1.1); background: #ff6b81; }
    </style>
</head>
<body>

    <button onclick="launchChaos()">🔥 点击开启 10 个弹跳窗口 🔥</button>

    <script>
        function launchChaos() {
            // Number of windows to spawn
            for (let i = 0; i < 10; i++) {
                createBouncer();
            }
        }

        function createBouncer() {
            // Initial random position
            let x = Math.random() * (screen.width - 250);
            let y = Math.random() * (screen.height - 250);
            
            // Random speed and direction for each window
            let dx = (Math.random() - 0.5) * 20; 
            let dy = (Math.random() - 0.5) * 20;

            // Open the window
            const win = window.open('', '', `width=250,height=200,left=${x},top=${y}`);
            
            if (!win) {
                alert("请在浏览器上方点击‘始终允许弹出窗口’，否则动画无法显示！");
                return;
            }

            // Style the popup content
            win.document.write(`
                <body style="background:#747d8c; color:white; display:flex; align-items:center; justify-content:center; overflow:hidden;">
                    <h2 style="font-family:sans-serif;">🚀 BOUNCING!</h2>
                </body>
            `);

            // Animation loop for this specific window
            const interval = setInterval(() => {
                if (win.closed) {
                    clearInterval(interval);
                    return;
                }

                x += dx;
                y += dy;

                // Wall collision detection
                if (x + 250 > screen.width || x < 0) dx = -dx;
                if (y + 200 > screen.height || y < 0) dy = -dy;

                win.moveTo(x, y);
            }, 20);
        }
    </script>
</body>
</html>
