<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Fake Virus Popup Storm</title>
    <style>
        body { 
            margin: 0; background: #008080;
            height: 100vh; overflow: hidden; font-family: sans-serif;
        }

        /* Fake Window Look */
        .fake-window {
            position: absolute; width: 240px; height: 160px;
            background: #f0f0f0; border: 2px solid #000;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
            animation: flicker 0.2s infinite alternate;
        }

        .header { 
            height: 25px; background: #800000; 
            color: white; padding: 0 10px; 
            font-size: 12px; display: flex; align-items: center; 
            justify-content: space-between;
        }

        .close-btn {
            background: #ff4444;
            width: 18px; height: 18px;
            text-align: center;
            line-height: 18px;
            cursor: pointer;
            border: 1px solid #000;
            font-weight: bold;
        }

        .body { 
            flex: 1; background: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 22px; border: 1px inset #808080; margin: 2px; 
            color: red; font-weight: bold;
        }

        @keyframes flicker {
            0% { opacity: 1; }
            100% { opacity: 0.85; }
        }
    </style>
</head>
<body>

<script>
    let step = 0;
    const w = 240;
    const h = 160;

    /* ---------------- 自动循环弹窗 ---------------- */
    function autoSpawn() {
        spawnRandomWindow();
        setTimeout(autoSpawn, 500); // 每 0.5 秒弹一个（可调）
    }

    /* ---------------- 随机位置生成弹窗 ---------------- */
    function spawnRandomWindow() {
        const x = Math.random() * (window.innerWidth - w);
        const y = Math.random() * (window.innerHeight - h);
        createWindow(x, y);
        step++;
    }

    /* ---------------- 创建弹窗 ---------------- */
    function createWindow(x, y) {
        const win = document.createElement('div');
        win.className = 'fake-window';
        win.style.left = x + 'px';
        win.style.top = y + 'px';
        win.style.zIndex = step;

        win.innerHTML = `
            <div class="header">
                Alert #${step}
                <div class="close-btn" onclick="explodeWindows(event)">X</div>
            </div>
            <div class="body">⚠️ Threat</div>
        `;

        document.body.appendChild(win);
    }

    /* ---------------- 假关闭按钮：生成更多弹窗 ---------------- */
    function explodeWindows(event) {
        event.stopPropagation();

        // 每次点击生成 5 个随机弹窗
        for (let i = 0; i < 5; i++) {
            const x = Math.random() * (window.innerWidth - w);
            const y = Math.random() * (window.innerHeight - h);
            createWindow(x, y);
            step++;
        }
    }

    /* ---------------- 打开网页就开始 ---------------- */
    window.onload = autoSpawn;
</script>

</body>
