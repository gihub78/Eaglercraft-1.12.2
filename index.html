<!DOCTYPE html>
<html>
<head>
    <title>Chaos Burst</title>
    <style>
        body { background: #111; color: #00ff00; text-align: center; padding-top: 100px; font-family: monospace; }
        button { 
            padding: 30px 60px; font-size: 25px; cursor: pointer; 
            background: #00ff00; color: #000; border: none; border-radius: 10px;
            box-shadow: 0 0 20px #00ff00; font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>SYSTEM OVERLOAD SIMULATOR</h1>
    <p>If only 1 pops up, check the URL bar for a "Blocked" icon!</p>
    <button onclick="triggerExplosion()">START EXPLOSION</button>

    <script>
        function triggerExplosion() {
            const total = 12; // Let's try 12 windows
            
            for (let i = 0; i < total; i++) {
                // We add a slight delay for each window (i * 100ms)
                // This tricks some browsers into thinking they are separate actions
                setTimeout(() => {
                    spawnWindow(i, total);
                }, i * 150); 
            }
        }

        function spawnWindow(index, total) {
            const angle = (index / total) * Math.PI * 2;
            const startX = screen.width / 2;
            const startY = screen.height / 2;

            // Unique window name 'w' + index is mandatory
            const win = window.open('', 'w' + index, `width=200,height=150,left=${startX},top=${startY}`);

            if (win) {
                win.document.write(`<body style="background:hsl(${index * 30}, 70%, 50%);"></body>`);
                
                let distance = 0;
                const move = setInterval(() => {
                    if (win.closed) { clearInterval(move); return; }
                    
                    distance += 15;
                    const curX = startX + Math.cos(angle) * distance;
                    const curY = startY + Math.sin(angle) * distance;
                    
                    win.moveTo(curX, curY);

                    // Stop after moving 600 pixels
                    if (distance > 600) clearInterval(move);
                }, 16);
            }
        }
    </script>
</body>
</html>
