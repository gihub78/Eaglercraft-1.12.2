<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Stationary Path Stack</title>
    <style>
        body { 
            margin: 0; background: #008080;
            height: 100vh; overflow: hidden; font-family: sans-serif;
        }

        .controls { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 9999; 
        }
        button { 
            padding: 15px 30px; font-size: 18px; cursor: pointer; 
            background: #c0c0c0; border: 2px solid #000;
            box-shadow: inset -2px -2px #808080, inset 2px 2px #fff;
        }
        button:active { box-shadow: inset 2px 2px #808080, inset -2px -2px #fff; }

        /* Fake Window Look */
        .fake-window {
            position: absolute; width: 240px; height: 160px;
            background: #f0f0f0; border: 2px solid #000;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
            animation: flicker 0.2s infinite alternate;
        }

        .header { 
            height: 25px; background: #800000; 
            color: white; padding: 0 10px; 
            font-size: 12px; display: flex; align-items: center; 
            justify-content: space-between;
        }

        .close-btn {
            background: #ff4444;
            width: 18px; height: 18px;
            text-align: center;
            line-height: 18px;
            cursor: pointer;
            border: 1px solid #000;
            font-weight: bold;
        }

        .body { 
            flex: 1; background: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 22px; border: 1px inset #808080; margin: 2px; 
            color: red; font-weight: bold;
        }

        @keyframes flicker {
            0% { opacity: 1; }
            100% { opacity: 0.85; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="spawnNext()">点一下弹一个 (遵循路径)</button>
        <button onclick="location.reload()" style="background:#ff4757; color:white;">重置</button>
    </div>

    <script>
        let step = 0;
        const w = 240;
        const h = 160;

        function spawnNext() {
            const screenW = window.innerWidth - w;
            const screenH = window.innerHeight - h;

            const pathPoints = [
                { x: 0, y: 0 },
                { x: screenW, y: screenH },
                { x: screenW / 2, y: 0 },
                { x: screenW / 2, y: screenH },
                { x: screenW, y: 0 },
                { x: 0, y: screenH }
            ];

            const point = pathPoints[step % pathPoints.length];

            createWindow(point.x, point.y);
            step++;
        }

        /* ---------------- Create Fake Window ---------------- */
        function createWindow(x, y) {
            const win = document.createElement('div');
            win.className = 'fake-window';
            win.style.left = x + 'px';
            win.style.top = y + 'px';
            win.style.zIndex = step;

            win.innerHTML = `
                <div class="header">
                    Alert #${step}
                    <div class="close-btn" onclick="explodeWindows(event)">X</div>
                </div>
                <div class="body">⚠️ Threat</div>
            `;

            document.body.appendChild(win);
        }

        /* ---------------- Fake Close Button = More Windows ---------------- */
        function explodeWindows(event) {
            event.stopPropagation(); // Prevent bubbling

            // Create 3 new windows at random positions
            for (let i = 0; i < 3; i++) {
                const x = Math.random() * (window.innerWidth - w);
                const y = Math.random() * (window.innerHeight - h);
                createWindow(x, y);
                step++;
            }
        }
    </script>
</body>
</html>
