<!DOCTYPE html>
<html>
<head>
    <title>Explosion Test</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        button { padding: 30px 60px; font-size: 30px; cursor: pointer; background: red; color: white; border-radius: 50px; }
    </style>
</head>
<body>
    <button onclick="startChaos()">点我：允许后再次点击</button>

    <script>
        function startChaos() {
            // 尝试弹出 10 个
            for (let i = 0; i < 10; i++) {
                const angle = (i / 10) * Math.PI * 2;
                const x = (screen.width / 2) + Math.cos(angle) * 10;
                const y = (screen.height / 2) + Math.sin(angle) * 10;
                
                // 核心：给每个窗口一个唯一的名称（第二个参数）
                const win = window.open('about:blank', 'win' + i, `width=200,height=150,left=${x},top=${y}`);
                
                if (win) {
                    animateWin(win, angle);
                }
            }
        }

        function animateWin(win, angle) {
            let dist = 0;
            const speed = 15;
            const timer = setInterval(() => {
                if (win.closed) { clearInterval(timer); return; }
                dist += speed;
                const curX = (screen.width / 2) + Math.cos(angle) * dist;
                const curY = (screen.height / 2) + Math.sin(angle) * dist;
                win.moveTo(curX, curY);
                if (dist > 1000) { clearInterval(timer); win.close(); }
            }, 16);
        }
    </script>
</body>
</html>
