<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Stacking Windows</title>
    <style>
        body { 
            margin: 0; background: #2c3e50; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; font-family: sans-serif; 
        }
        .controls { position: fixed; top: 20px; z-index: 1000; }
        button { 
            padding: 15px 30px; font-size: 18px; cursor: pointer; 
            background: #27ae60; color: white; border: none; border-radius: 5px;
            box-shadow: 0 4px #219150;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px #219150; }

        /* 弹窗样式 */
        .fake-window {
            position: absolute; width: 300px; height: 100px;
            background: #ecf0f1; border: 1px solid #bdc3c7;
            border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
            /* 出现时的动画：渐显并稍微下滑 */
            animation: slideDown 0.3s ease-out forwards;
        }

        .window-header { height: 25px; background: #34495e; color: white; display: flex; align-items: center; padding: 0 10px; font-size: 12px; border-radius: 4px 4px 0 0; }
        .window-body { flex: 1; display: flex; align-items: center; justify-content: center; color: #333; font-weight: bold; }

        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="stackWindow()">点击向下弹窗</button>
        <button onclick="location.reload()" style="background:#c0392b; box-shadow: 0 4px #a93226;">清空</button>
    </div>

    <script>
        let windowCount = 0;
        const startTop = 80;  // 第一个弹窗距离顶部的距离
        const startLeft = 50; // 距离左侧的距离
        const gap = 110;      // 每个弹窗之间的垂直间距（略大于窗口高度）

        function stackWindow() {
            const win = document.createElement('div');
            win.className = 'fake-window';
            
            // 计算位置：每次点击，Top值增加
            const currentTop = startTop + (windowCount * gap);
            const currentLeft = startLeft;

            win.style.top = currentTop + 'px';
            win.style.left = currentLeft + 'px';
            
            win.innerHTML = `
                <div class="window-header">系统通知 #${windowCount + 1}</div>
                <div class="window-body">我是第 ${windowCount + 1} 个弹窗</div>
            `;

            document.body.appendChild(win);
            windowCount++;

            // 如果弹窗超出屏幕底端，可以自动滚动或提醒
            if (currentTop + 100 > window.innerHeight) {
                console.log("已经弹到底部了！");
            }
        }
    </script>
</body>
</html>
