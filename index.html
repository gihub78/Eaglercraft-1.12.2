<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>路径后乱弹动画</title>
    <style>
        body { margin: 0; overflow: hidden; background: #008080; height: 100vh; }
        .btn { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; padding: 15px 30px; cursor: pointer; background: #c0c0c0; border: 2px solid #000; font-weight: bold; }
        
        .fake-win {
            position: absolute; width: 200px; height: 120px;
            background: #f0f0f0; border: 2px solid #000; box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; z-index: 10;
        }
        .header { height: 25px; background: #000080; color: white; display: flex; align-items: center; padding: 0 5px; font-size: 12px; }
        .body { flex: 1; background: white; display: flex; align-items: center; justify-content: center; font-size: 30px; }
    </style>
</head>
<body>

    <button class="btn" onclick="startLegacy()">启动任务</button>

    <script>
        function startLegacy() {
            const win = document.createElement('div');
            win.className = 'fake-win';
            win.innerHTML = `<div class="header">任务运行中...</div><div class="body">🛸</div>`;
            document.body.appendChild(win);

            const w = 200, h = 120;
            const screenW = window.innerWidth - w;
            const screenH = window.innerHeight - h;

            // 你的指定路径
            const path = [
                {x: 0, y: 0},               // 左上
                {x: screenW, y: screenH},   // 右下
                {x: screenW/2, y: 0},       // 上面
                {x: screenW/2, y: screenH}, // 下面
                {x: screenW, y: 0},         // 右上
                {x: 0, y: screenH}          // 左下
            ];

            let step = 0;
            let curX = path[0].x, curY = path[0].y;
            let dx = 0, dy = 0; // 用于后续乱弹的速度

            function animate() {
                if (step < path.length - 1) {
                    // --- 阶段 1: 路径滑行 ---
                    const target = path[step + 1];
                    const dist = Math.sqrt(Math.pow(target.x - curX, 2) + Math.pow(target.y - curY, 2));
                    
                    if (dist > 10) {
                        curX += (target.x - curX) / 15; // 平滑移动
                        curY += (target.y - curY) / 15;
                    } else {
                        step++; // 到达一个点，目标切换到下一个
                    }
                } else {
                    // --- 阶段 2: 屏幕乱弹 ---
                    if (dx === 0 && dy === 0) { // 初始化乱弹速度
                        dx = 8; dy = 6;
                    }
                    curX += dx;
                    curY += dy;

                    // 碰撞检测
                    if (curX <= 0 || curX >= screenW) dx *= -1;
                    if (curY <= 0 || curY >= screenH) dy *= -1;
                }

                win.style.left = curX + 'px';
                win.style.top = curY + 'px';
                requestAnimationFrame(animate);
            }

            animate();
        }
    </script>
</body>
</html>
