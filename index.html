<!DOCTYPE html>
<html>
<head>
    <title>弹窗测试</title>
</head>
<body>
    <button onclick="popMany()">点我弹出10个窗口</button>

    <script>
        function popMany() {
            // 循环10次
            for (let i = 0; i < 10; i++) {
                // 打开一个 300x300 的新窗口
                window.open('https://www.google.com', '_blank', 'width=300,height=300');
            }
        }
    </script>
</body>
</html>
