<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Stationary Path Stack</title>
    <style>
        body { 
            margin: 0; background: #008080; /* Win95 Teal */
            height: 100vh; overflow: hidden; font-family: sans-serif;
        }
        .controls { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 9999; 
        }
        button { 
            padding: 15px 30px; font-size: 18px; cursor: pointer; 
            background: #c0c0c0; border: 2px solid #000;
            box-shadow: inset -2px -2px #808080, inset 2px 2px #fff;
        }
        button:active { box-shadow: inset 2px 2px #808080, inset -2px -2px #fff; }

        /* Fake Window Look */
        .fake-window {
            position: absolute; width: 220px; height: 140px;
            background: #f0f0f0; border: 2px solid #000;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
        }
        .header { height: 25px; background: #000080; color: white; padding: 0 10px; font-size: 12px; display: flex; align-items: center; }
        .body { flex: 1; background: white; display: flex; align-items: center; justify-content: center; font-size: 30px; border: 1px inset #808080; margin: 2px; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="spawnNext()">点一下弹一个 (遵循路径)</button>
        <button onclick="location.reload()" style="background:#ff4757; color:white;">重置</button>
    </div>

    <script>
        let step = 0;
        const w = 220; // Window Width
        const h = 140; // Window Height

        function spawnNext() {
            // Screen boundaries
            const screenW = window.innerWidth - w;
            const screenH = window.innerHeight - h;

            // Your specific path sequence
            const pathPoints = [
                { x: 0, y: 0 },                  // 1. 左上角
                { x: screenW, y: screenH },      // 2. 右下角
                { x: screenW / 2, y: 0 },        // 3. 上面 (居中)
                { x: screenW / 2, y: screenH },   // 4. 下面 (居中)
                { x: screenW, y: 0 },            // 5. 右上角
                { x: 0, y: screenH }             // 6. 左下角
            ];

            // Get current target point (Loop back to start if finished)
            const point = pathPoints[step % pathPoints.length];

            const win = document.createElement('div');
            win.className = 'fake-window';
            
            // Apply coordinates directly (STATIONARY)
            win.style.left = point.x + 'px';
            win.style.top = point.y + 'px';
            
            // Add a higher z-index so the newest is always on top
            win.style.zIndex = step;

            win.innerHTML = `
                <div class="header">弹窗 #${step + 1}</div>
                <div class="body">📁</div>
            `;

            document.body.appendChild(win);
            step++;
        }
    </script>
</body>
</html>
