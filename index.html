<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; height: 100vh; font-family: sans-serif; }
        .controls { position: absolute; z-index: 999; top: 20px; left: 50%; transform: translateX(-50%); }
        button { padding: 15px 30px; cursor: pointer; font-weight: bold; background: #e94560; color: white; border: none; border-radius: 5px; }

        .fake-window {
            position: absolute; width: 220px; height: 150px;
            background: #f0f0f0; border: 2px solid #333; border-radius: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); pointer-events: none;
            display: flex; flex-direction: column; transition: transform 0.1s linear;
        }
        .header { height: 25px; background: #000080; color: white; padding: 0 10px; display: flex; align-items: center; font-size: 12px; }
        .body { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 30px; background: white; }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="spawnPathWindow()">启动路径弹窗 (平滑不瞬移)</button>
</div>

<script>
    function spawnPathWindow() {
        const win = document.createElement('div');
        win.className = 'fake-window';
        win.innerHTML = `<div class="header">巡航任务</div><div class="body">🛸</div>`;
        document.body.appendChild(win);

        // 窗口尺寸
        const w = 220; const h = 150;
        const screenW = window.innerWidth - w;
        const screenH = window.innerHeight - h;

        // 定义你的指定路径点 (X, Y)
        const path = [
            { x: 0, y: 0 },              // 左上角 (起点)
            { x: screenW, y: screenH },  // 右下角
            { x: screenW / 2, y: 0 },    // 上面 (居中)
            { x: screenW / 2, y: screenH }, // 下面 (居中)
            { x: screenW, y: 0 },        // 右上角
            { x: 0, y: screenH }         // 左下角
        ];

        let currentStep = 0;
        let posX = path[0].x;
        let posY = path[0].y;
        
        // 初始位置设定 (防止瞬移)
        win.style.left = posX + 'px';
        win.style.top = posY + 'px';

        function move() {
            if (currentStep >= path.length - 1) return; // 完成路径

            const target = path[currentStep + 1];
            const dx = target.x - posX;
            const dy = target.y - posY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const speed = 8; // 移动速度

            if (distance > speed) {
                posX += (dx / distance) * speed;
                posY += (dy / distance) * speed;
                win.style.left = posX + 'px';
                win.style.top = posY + 'px';
                requestAnimationFrame(move);
            } else {
                // 到达一个点，转向下一个
                currentStep++;
                requestAnimationFrame(move);
            }
        }

        requestAnimationFrame(move);
    }
</script>
</body>
</html>
